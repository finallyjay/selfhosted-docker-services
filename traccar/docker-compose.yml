services:
  traccar:
    image: traccar/traccar:latest
    container_name: traccar
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: cat < /dev/tcp/localhost/8082 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network
    ports:
      - 25002:5013
      - 25003:5023
    volumes:
      - ${TRACCAR_DATA}/traccar/logs:/opt/traccar/logs
      - ${TRACCAR_DATA}/traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - ${TRACCAR_DATA}/traccar/data:/opt/traccar/data/:rw
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.centurylinklabs.watchtower.enable=true

networks:
  dokploy-network:
    external: true

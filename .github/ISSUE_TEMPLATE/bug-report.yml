name: Bug Report
description: Report a problem with a service configuration
labels: ["bug"]
body:
  - type: dropdown
    id: service
    attributes:
      label: Service
      description: Which service is affected?
      options:
        - ArchiSteamFarm
        - Cloudflared
        - Homepage
        - MySpotify
        - Pi-hole
        - Plex
        - Speedtest
        - Traccar
        - Watchtower
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the issue
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant container logs
      render: text
    validations:
      required: false
  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      placeholder: "e.g., 29.3.1"
    validations:
      required: false

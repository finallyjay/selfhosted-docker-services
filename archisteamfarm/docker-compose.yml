services:
  archisteamfarm:
    image: justarchi/archisteamfarm:latest
    container_name: archisteamfarm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - cloudflare-exposed
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${ARCHISTEAMFARM_DATA}/config:/app/config
      - ${ARCHISTEAMFARM_DATA}/logs:/app/logs
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - homepage.group=Bots
      - homepage.name=ArchiSteamFarm
      - homepage.icon=archisteamfarm.png
      - homepage.href=https://${ARCHISTEAMFARM_LOCAL_DOMAIN}
      - homepage.description=Steam bots management

networks:
  cloudflare-exposed:
    external: true
